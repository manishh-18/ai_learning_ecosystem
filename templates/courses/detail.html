{% extends 'base.html' %}
{% block content %}

<div class="container mt-4">

    <h2>{{ course.title }}</h2>
    <p class="text-muted">{{ course.description }}</p>

    <hr>

    <h5>📄 Study Material</h5>

{% for m in materials %}
    <div class="card p-2 mb-2">
        <a href="{{ m.file.url }}" target="_blank">
            {{ m.title }}
        </a>
    </div>
{% empty %}
    <p>No materials yet</p>
{% endfor %}

    <hr>

    <h5>🧠 Quizzes</h5>
    {% for quiz in quizzes %}
        <div class="card p-2 mb-2">
            <a href="{% url 'view_quiz' quiz.id %}">
                Attempt Quiz
            </a>
        </div>
    {% empty %}
        <p>No quizzes yet</p>
    {% endfor %}

</div>

{% endblock %}
