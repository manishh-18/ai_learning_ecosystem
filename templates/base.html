<!DOCTYPE html>
<html>
<head>
    <title>AI Learning System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F9FAFB;
        }
        .sidebar {
            width: 240px;
            height: 100vh;
            position: fixed;
            background: #111827;
            color: white;
            padding: 20px;
        }
        .sidebar a {
            color: #9CA3AF;
            display: block;
            margin-bottom: 15px;
            text-decoration: none;
        }
        .sidebar a:hover {
            color: white;
        }
        .content {
            margin-left: 260px;
            padding: 30px;
        }
        .card {
            border-radius: 12px;
        }
        .card {
            border-radius: 12px;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }
        .sidebar a.text-white {
            font-weight: 600;
            border-left: 3px solid #6366F1;
            padding-left: 10px;
        }
        .alert-wrapper {
            position: fixed;
            top: 20px;
            left: 58%;
            transform: translateX(-50%);
            width: 50%;
            z-index: 9999;
        }

        .custom-alert {
            border-radius: 10px;
            font-weight: 500;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
    </style>
</head>

<body>

<div class="sidebar">
    <h4>AI LMS</h4>
    <hr>

    <a href="/accounts/redirect/" class="{% if request.path == '/accounts/redirect/' %}text-white{% endif %}"><i class="fas fa-home"></i> Dashboard</a>
    <a href="/courses/list/" class="{% if '/courses' in request.path %}text-white{% endif %}"><i class="fas fa-book"></i> Courses</a>
    <a href="/analytics/" class="{% if '/analytics' in request.path %}text-white{% endif %}">
        <i class="fas fa-chart-line"></i> Analytics
    </a>
    <a href="/documents/list/" class="{% if '/documents' in request.path %}text-white{% endif %}"><i class="fas fa-file"></i> Documents</a>
    <a href="/assessments/list/" class="{% if '/assessments' in request.path %}text-white{% endif %}">
        <i class="fas fa-question-circle"></i> Quizzes
    </a>
    <a href="/ai/chat/" class="{% if '/ai' in request.path %}text-white{% endif %}"><i class="fas fa-robot"></i> AI Tutor</a>
    <a href="/accounts/logout/"><i class="fas fa-sign-out-alt"></i> Logout</a>
</div>
{% if messages %}
<div class="alert-wrapper">
  {% for message in messages %}
    <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} alert-dismissible fade show custom-alert" role="alert">
      {{ message }}
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
  {% endfor %}
</div>
{% endif %}
<div class="content">
    {% block content %}{% endblock %}
</div>

<script>
setTimeout(() => {
    document.querySelectorAll('.alert').forEach(alert => {
        alert.classList.remove('show');
        setTimeout(() => alert.remove(), 300);
    });
}, 10000);
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
