<!DOCTYPE html>
<html>
<head>
    <title>AI Learning System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F9FAFB;
        }
        .sidebar {
            width: 240px;
            height: 100vh;
            position: fixed;
            background: #111827;
            color: white;
            padding: 20px;
        }
        .sidebar a {
            color: #9CA3AF;
            display: block;
            margin-bottom: 15px;
            text-decoration: none;
        }
        .sidebar a:hover {
            color: white;
        }
        .content {
            margin-left: 260px;
            padding: 30px;
        }
        .card {
            border-radius: 12px;
        }
        .card {
            border-radius: 12px;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }
    </style>
</head>

<body>

<div class="sidebar">
    <h4>AI LMS</h4>
    <hr>

    <a href="/accounts/redirect/"><i class="fas fa-home"></i> Dashboard</a>
    <a href="/courses/list/"><i class="fas fa-book"></i> Courses</a>
    <a href="/documents/list/"><i class="fas fa-file"></i> Documents</a>
    <a href="/ai/chat/"><i class="fas fa-robot"></i> AI Tutor</a>
    <a href="/accounts/logout/"><i class="fas fa-sign-out-alt"></i> Logout</a>
</div>

<div class="content">
    {% block content %}{% endblock %}
</div>

</body>
</html>
