<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #4F46E5, #6366F1);
        }

        .card {
            border-radius: 16px;
        }
    </style>
</head>

<body>
<div class="d-flex justify-content-center align-items-center mt-4">
    
    <a href="{% url 'role_selection' %}" class="btn btn-light border">
        <i class="fas fa-home"></i>
    </a>

    <div></div>

</div>
<div class="container d-flex justify-content-center align-items-center" style="height:100vh;">
    

    <div class="card shadow p-4" style="width:400px;">

        <h3 class="text-center mb-3">Welcome Back</h3>

        {% if error %}
            <p class="text-danger text-center">{{ error }}</p>
        {% endif %}

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-danger text-center">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <input class="form-control mb-3" name="username" placeholder="Username" required>

            <div class="input-group mb-3">
                <input id="loginPass" type="password" class="form-control" name="password" placeholder="Password" required>
                <span class="input-group-text" onclick="togglePassword('loginPass')">
                    <i class="fas fa-eye"></i>
                </span>
            </div>
            <input type="checkbox" class="mb-3"> Remember me
            <button id="submitBtn" type="submit" class="btn btn-primary w-100 d-flex justify-content-center align-items-center">
                <span id="btnText">Login</span>
                <span id="btnLoader" class="spinner-border spinner-border-sm ms-2 d-none"></span>
            </button>
        </form>

        <p class="text-center mt-3">
            New user? <a href="/accounts/register/?role=student">Sign up</a>
        </p>

    </div>

</div>

<script>
function togglePassword(id) {
    const input = document.getElementById(id);
    input.type = input.type === "password" ? "text" : "password";
}
document.querySelector("form").addEventListener("submit", function() {
    const btn = document.getElementById("submitBtn");
    const text = document.getElementById("btnText");
    const loader = document.getElementById("btnLoader");

    btn.disabled = true;
    loader.classList.remove("d-none");
    text.innerText = "Processing...";
    // if (btn.disabled) return;
});
</script>

</body>
</html>
