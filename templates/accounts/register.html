<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #4F46E5, #6366F1);
        }

        .card {
            border-radius: 16px;
        }

        .input-group-text {
            background: white;
        }
        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
    </style>
</head>

<body>
<div class="d-flex justify-content-center align-items-center mt-4">
    
    <a href="{% url 'role_selection' %}" class="btn btn-light border">
        <i class="fas fa-home"></i>
    </a>

    <div></div>

</div>

<div class="container d-flex justify-content-center align-items-center" style="height:100vh;">

    <div class="card glass shadow p-4" style="width:420px;">

        <h3 class="text-center mb-3">Create Account</h3>

        <p class="text-center">
            <span class="badge bg-primary">{{ role|title }} Sign Up</span>
        </p>
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-danger text-center">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <input type="hidden" name="role" value="{{ role }}">

            <!-- Full Name -->
            <input class="form-control mb-3" name="full_name" placeholder="Full Name" required>

            <!-- Username -->
            <input class="form-control mb-3" name="username" placeholder="Username" required>

            <!-- Email -->
            <input class="form-control mb-3" name="email" placeholder="Email" required>

            <!-- Password -->
            <div class="mb-3">
                <div class="input-group mb-3"> 
                    <input id="password1" type="password" class="form-control" name="password1" placeholder="Password" required>
                    <span class="input-group-text" onclick="togglePassword('password1')">
                        <i class="fas fa-eye"></i>
                    </span>
                </div>
                <!-- Strength Bar -->
                <div class="progress mt-2" style="height:6px;">
                    <div id="strengthBar" class="progress-bar" style="width:0%"></div>
                </div>

                <!-- Strength Text -->
                <small id="strengthText" class="text-muted"></small>
            </div>

            <!-- Confirm Password -->
            <div class="input-group mb-3">
                <input id="password2" type="password" class="form-control" name="password2" placeholder="Confirm Password" required>
                <span class="input-group-text" onclick="togglePassword('password2')">
                    <i class="fas fa-eye"></i>
                </span>
            </div>

            <button id="submitBtn" type="submit" class="btn btn-primary w-100 d-flex justify-content-center align-items-center">
                <span id="btnText">Register</span>
                <span id="btnLoader" class="spinner-border spinner-border-sm ms-2 d-none"></span>
            </button>
        </form>

        <p class="text-center mt-3">
            Already have an account? <a href="/accounts/login/">Login</a>
        </p>

    </div>

</div>

<script>
function togglePassword(id) {
    const input = document.getElementById(id);
    input.type = input.type === "password" ? "text" : "password";
}
// document.getElementById("password1").addEventListener("input", function() {
//     let val = this.value;
//     let strength = "Weak";

//     if (val.length > 6) strength = "Medium";
//     if (val.length > 10 && /[A-Z]/.test(val)) strength = "Strong";

//     document.getElementById("strengthText").innerText = "Strength: " + strength;
// });
</script>
<script>
const passwordInput = document.getElementById("password1");
const strengthBar = document.getElementById("strengthBar");
const strengthText = document.getElementById("strengthText");

passwordInput.addEventListener("input", function () {
    const val = passwordInput.value;

    let strength = 0;

    if (val.length > 0) strength++;
    if (val.match(/[A-Z]/)) strength++;
    if (val.match(/[0-9]/)) strength++;
    if (val.match(/[^A-Za-z0-9]/)) strength++;

    if (strength === 0) {
        strengthBar.style.width = "0%";
        strengthText.innerText = "";
    }
    else if (strength === 1) {
        strengthBar.style.width = "25%";
        strengthBar.className = "progress-bar bg-danger";
        strengthText.innerText = "Weak";
        strengthText.style.color = "red";
    }
    else if (strength === 2) {
        strengthBar.style.width = "50%";
        strengthBar.className = "progress-bar bg-warning";
        strengthText.innerText = "Medium";
        strengthText.style.color = "orange";
    }
    else if (strength >= 3) {
        strengthBar.style.width = "100%";
        strengthBar.className = "progress-bar bg-success";
        strengthText.innerText = "Strong";
        strengthText.style.color = "green";
    }
});
document.querySelector("form").addEventListener("submit", function() {
    const btn = document.getElementById("submitBtn");
    const text = document.getElementById("btnText");
    const loader = document.getElementById("btnLoader");

    btn.disabled = true;
    loader.classList.remove("d-none");
    text.innerText = "Processing...";
    // if (btn.disabled) return;
});
</script>

</body>
</html>
