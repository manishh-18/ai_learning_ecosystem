{% extends 'base.html' %}

{% block content %}

<h2 class="text-success mb-4">Score: {{ score }}/{{ total }}</h2>

{% for r in results %}
<div class="card glass p-3 mb-3 shadow-sm">

    <p><b>{{ r.question }}</b></p>
    <p>{{ r.result }}</p>

    {% if r.result == 'Wrong' %}
        <p class="text-danger">Your Answer: {{ r.selected }}</p>
        <p class="text-success">Correct: {{ r.correct }}</p>
        <div class="bg-light p-2 rounded">
            {{ r.feedback }}
        </div>
    {% endif %}

</div>
{% endfor %}

{% endblock %}
