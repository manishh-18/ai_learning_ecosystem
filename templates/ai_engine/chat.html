{% extends 'base.html' %}

{% block content %}

<style>
.chat-layout {
    display: flex;
    gap: 20px;
}

/* SIDEBAR */
.chat-sidebar {
    width: 260px;
    background: #0f172a;
    padding: 15px;
    border-radius: 12px;
    color: white;
}

.chat-sidebar a {
    text-decoration: none;
}

.chat-session {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px;
    margin-bottom: 8px;
    border-radius: 8px;
    background: #1f2937;
    transition: 0.2s;
}

.chat-session.active {
    background: #6366F1;
}

.chat-session:hover {
    background: #374151;
}

.chat-session span {
    color: white;
    font-size: 14px;
}

/* CHAT AREA */
.chat-container {
    flex: 1;
    max-width: 900px;
}

.chat-box {
    height: 480px;
    overflow-y: auto;
    padding: 20px;
    background: #f9fafb;
    border-radius: 15px;
}

/* MESSAGES */
.chat-row {
    display: flex;
    margin-bottom: 12px;
}

.user-row {
    justify-content: flex-end;
}

.bot-row {
    justify-content: flex-start;
}

.msg {
    padding: 10px 15px;
    border-radius: 15px;
    max-width: 65%;
    font-size: 14px;
}

.user {
    background: linear-gradient(135deg, #6366F1, #4F46E5);
    color: white;
}

.bot {
    background: #e5e7eb;
}

.msg.bot p {
    margin: 5px 0;
    line-height: 1.5;
}

/* INPUT */
.chat-input-box {
    display: flex;
    margin-top: 10px;
    gap: 10px;
}

.chat-input-box input {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #ddd;
}

.chat-input-box button {
    background: #6366F1;
    color: white;
    border: none;
    padding: 10px 15px;
    border-radius: 10px;
}
.msg.bot p {
    margin: 6px 0;
    line-height: 1.6;
}

.msg.bot li {
    margin: 4px 0;
    line-height: 1.5;
}
.msg.bot h1, .msg.bot h2, .msg.bot h3 {
    font-weight: 600;
    margin-top: 10px;
}

.msg.bot p {
    margin: 6px 0;
    line-height: 1.6;
}

.msg.bot ul {
    padding-left: 20px;
}

.msg.bot li {
    margin: 5px 0;
}

.msg.bot code {
    background: #111827;
    color: #f8f9f9;
    padding: 3px 6px;
    border-radius: 5px;
}

.msg.bot pre {
    background: #111827;
    color: #eff3f1;
    padding: 10px;
    border-radius: 10px;
    overflow-x: auto;
}
</style>

<div class="chat-layout">

    <!-- SIDEBAR -->
<div class="chat-sidebar">

    <button id="multiDeleteBtn" class="btn btn-danger w-100 mb-2" style="display:none;">
        Delete Selected
    </button>

    <a href="{% url 'chat' %}" class="btn btn-primary w-100 mb-3">
        + New Chat
    </a>

    <form id="multiDeleteForm" method="POST" action="{% url 'delete_multiple_chats' %}">
        {% csrf_token %}

        <div style="max-height:500px; overflow-y:auto;">

            {% for s in sessions %}
            <div class="chat-session {% if s.id == current_session.id %}active{% endif %}">

                <!-- Checkbox -->
                <input type="checkbox" class="chat-checkbox" name="session_ids[]" value="{{ s.id }}">

                <!-- Title -->
                <a href="{% url 'chat_session' s.id %}" style="flex:1; text-decoration:none; color:white;">
    {{ s.title|truncatechars:25 }}
</a>

<!-- Rename Button -->
<span onclick="renameChat({{ s.id }}, '{{ s.title }}')" 
      style="cursor:pointer; margin-left:8px;">
    ✏️
</span>

                <!-- Delete single -->
                <a href="{% url 'delete_chat' s.id %}" onclick="return confirm('Delete this chat?')" style="color:#f87171;">
                    🗑
                </a>

            </div>
            {% endfor %}

        </div>

    </form>

</div>

    <!-- CHAT AREA -->
    <div class="chat-container">

        <h3 class="mb-3">🤖 AI Tutor</h3>

        <div class="chat-box" id="chatBox">

            {% for chat in chats %}

            <div class="chat-row user-row">
                <div class="msg user">{{ chat.question }}</div>
            </div>

            <div class="chat-row bot-row">
                <div class="msg bot">
    {{ chat.answer|safe }}
</div>
            </div>

            {% endfor %}

        </div>

        <form method="post" class="chat-input-box">
            {% csrf_token %}
            <input type="text" name="message" placeholder="Ask anything..." required>
            <button type="submit">➤</button>
        </form>

    </div>

</div>

<script>
const chatBox = document.getElementById("chatBox");
chatBox.scrollTop = chatBox.scrollHeight;
</script>

<script>
// RENAME CHAT
function renameChat(id, oldTitle) {
    let newTitle = prompt("Rename chat:", oldTitle);

    if (newTitle && newTitle !== oldTitle) {
        fetch(`/ai/chat/rename/${id}/`, {
            method: "POST",
            headers: {
                "X-CSRFToken": "{{ csrf_token }}",
                "Content-Type": "application/x-www-form-urlencoded"
            },
            body: "title=" + encodeURIComponent(newTitle)
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                location.reload();
            }
        });
    }
}


// MULTI DELETE
const checkboxes = document.querySelectorAll(".chat-checkbox");
const deleteBtn = document.getElementById("multiDeleteBtn");

checkboxes.forEach(cb => {
    cb.addEventListener("change", () => {
        let anyChecked = [...checkboxes].some(c => c.checked);
        deleteBtn.style.display = anyChecked ? "block" : "none";
    });
});

deleteBtn.addEventListener("click", () => {
    if (confirm("Delete selected chats?")) {
        document.getElementById("multiDeleteForm").submit();
    }
});
</script>
{% endblock %}
