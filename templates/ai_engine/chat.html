{% extends 'base.html' %}

{% block content %}

<style>
.chat-container {
    max-width: 800px;
    margin: auto;
}

.chat-box {
    height: 400px;
    overflow-y: auto;
    background: #f8f9fa;
    padding: 15px;
    border-radius: 12px;
}

.user-msg {
    text-align: right;
    margin-bottom: 10px;
}

.bot-msg {
    text-align: left;
    margin-bottom: 10px;
}

.msg {
    display: inline-block;
    padding: 10px 15px;
    border-radius: 12px;
    max-width: 70%;
}

.user {
    background: #6366F1;
    color: white;
}

.bot {
    background: #e5e7eb;
}

.input-box {
    display: flex;
    margin-top: 10px;
}

.input-box input {
    flex: 1;
    border-radius: 8px;
}

</style>

<div class="chat-container">

    <h3 class="mb-3">🤖 AI Tutor</h3>

    <div class="chat-box" id="chatBox">

    {% for chat in chats %}

        <div class="user-msg">
            <div class="msg user">{{ chat.question }}</div>
        </div>

        <div class="bot-msg">
            <div class="msg bot">{{ chat.answer }}</div>
        </div>

    {% endfor %}

    </div>

    <form method="post" id="chatForm">
        {% csrf_token %}

        <div class="input-box">
            <input type="text" name="message" class="form-control me-2" placeholder="Ask something..." required autocomplete="off">
            <button class="btn btn-primary nav-loader">Send</button>
        </div>

    </form>

</div>

<script>
const chatBox = document.getElementById("chatBox");

// auto scroll to bottom on load
chatBox.scrollTop = chatBox.scrollHeight;
</script>
