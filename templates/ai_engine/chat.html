{% extends 'base.html' %}

{% block content %}

<h2 class="mb-4">AI Tutor</h2>

<form method="post" class="mb-3">
    {% csrf_token %}
    <input class="form-control" name="question" placeholder="Ask your doubt..." required>
</form>

{% for chat in chats %}

<div class="mb-3 text-end">
    <div class="bg-primary text-white p-2 rounded">
        {{ chat.question }}
    </div>
</div>

<div class="mb-3 text-start">
    <div class="bg-light p-2 rounded">
        {{ chat.answer }}
    </div>
</div>

{% endfor %}

{% endblock %}
