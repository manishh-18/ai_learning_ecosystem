{% extends 'base.html' %}

{% block content %}
<div class="mb-3">
    <a href="{% url 'document_list' %}" class="btn btn-outline-secondary">
        ← Back to Documents
    </a>
</div>
<div class="container mt-4">

    <h3>{{ doc.title }}</h3>

    <div class="summary-card markdown-body">
    {{ doc.ai_summary|safe }}
</div>

</div>

<style>
.summary-card {
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}
</style>

{% endblock %}
